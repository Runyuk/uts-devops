name: CI - Linting Pipeline

# Pipeline ini aktif setiap kali ada push ke branch apapun
on:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      # Langkah 1: Ambil kode dari repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Langkah 2: Siapkan environment Python
      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # Langkah 3: Install flake8
      - name: Install flake8
        run: pip install flake8

      # Langkah 4: Jalankan linting pada uts.py
      - name: Run flake8 linting
        run: flake8 uts.py --max-line-length=79
